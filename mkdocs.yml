site_name: CatalogueCanvas Docs
site_description: A domain-agnostic, self-hosted catalogue server — docs & showcase.
docs_dir: docs

repo_url: https://github.com/ToroRojo-code/CatalogueCanvas
repo_name: ToroRojo-code/CatalogueCanvas

copyright: >
  CatalogueCanvas — open source under the GNU AGPL v3.0.

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  font: false # fonts loaded via overrides/main.html (Archivo / Spectral / IBM Plex Mono)
  palette:
    - scheme: catalog-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: catalog-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Introduction: index.md
  - Documentation:
      - Introduction: documentation/intro.md
      - Ethos: documentation/ethos.md
      - Uses & for whom: documentation/uses.md
      - Install: documentation/install.md
      - User documentation: documentation/user.md
      - Uploading items: documentation/uploading.md
      - Admin documentation: documentation/admins.md
      - Roadmap: documentation/roadmap.md
      - Glossary: documentation/glossary.md

plugins:
  - search
