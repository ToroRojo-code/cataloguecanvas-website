site_name: CatalogueCanvas Docs
site_description: A domain-agnostic, self-hosted catalogue server — docs & showcase.
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  font: false  # fonts loaded via overrides/main.html (Archivo / Spectral / IBM Plex Mono)
  palette:
    - scheme: catalog-light
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: catalog-dark
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/accent.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Showcase:
      - Ethos: showcase/ethos.md
      - Introduction: showcase/intro.md
      - Uses & for whom: showcase/uses.md
  - Catalog:
      - Uploading items: catalog/uploading.md
  - Documentation:
      - Install: documentation/install.md
      - Roadmap: documentation/roadmap.md
      - User documentation: documentation/user.md
      - Admin documentation: documentation/admins.md
      - Glossary: documentation/glossary.md

plugins:
  - search
