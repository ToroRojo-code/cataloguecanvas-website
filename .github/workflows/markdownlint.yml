name: markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".markdownlintignore"
      - ".github/workflows/markdownlint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".markdownlintignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          # Config (.markdownlint.jsonc) and ignores (.markdownlintignore) are auto-discovered.
          globs: |
            docs/**/*.md
            README.md
