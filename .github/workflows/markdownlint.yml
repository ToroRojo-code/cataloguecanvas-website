name: markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".markdownlintignore"
      - ".github/workflows/markdownlint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".markdownlintignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v19
        with:
          # Config (.markdownlint.jsonc) and ignores (.markdownlintignore) are auto-discovered.
          globs: |
            docs/**/*.md
            README.md
