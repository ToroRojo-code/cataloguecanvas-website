name: markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".markdownlintignore"
      - ".github/workflows/markdownlint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.jsonc"
      - ".markdownlintignore"

permissions:
  contents: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          # Config (.markdownlint.jsonc) and ignores (.markdownlintignore) are auto-discovered.
          globs: |
            docs/**/*.md
            README.md
